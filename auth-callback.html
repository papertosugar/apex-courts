<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifying… — Smash Studio</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { padding-top: 80px; font-family: 'DM Sans', sans-serif; background: var(--ink); }
    .cb-page {
      min-height: calc(100vh - 80px);
      display: flex; align-items: center; justify-content: center; padding: 40px 20px;
    }
    .cb-card {
      background: var(--stone); border: 1px solid var(--stone-line);
      border-radius: 20px; max-width: 400px; width: 100%;
      padding: 48px 36px; text-align: center;
    }
    .cb-icon {
      width: 72px; height: 72px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .cb-icon.spin { border: 3px solid rgba(0,194,168,0.2); border-top-color: var(--gold); animation: spin 0.9s linear infinite; }
    .cb-icon.success { background: rgba(34,197,94,0.12); border: 2px solid rgba(34,197,94,0.3); }
    .cb-icon.error   { background: rgba(239,68,68,0.12);  border: 2px solid rgba(239,68,68,0.3); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cb-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--cream); margin-bottom: 8px; }
    .cb-body  { font-size: 14px; color: var(--cream-muted); line-height: 1.6; margin-bottom: 28px; }
    .cb-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 12px;
      background: var(--gold); color: var(--ink);
      font-size: 15px; font-weight: 800; font-family: inherit;
      border: none; cursor: pointer; text-decoration: none;
      transition: all 0.2s;
    }
    .cb-btn:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,194,168,0.3); }
    .cb-btn.ghost {
      background: transparent; border: 1px solid var(--stone-line);
      color: var(--cream-muted); margin-top: 10px; display: block;
    }
  </style>
</head>
<body>

<nav id="navbar" class="scrolled">
  <a href="/" class="nav-logo" aria-label="Smash Studio — Home">
    <div class="nav-logo-mark" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 2L18 17H2L10 2Z" stroke="#09090B" stroke-width="2" fill="none"/>
        <line x1="6" y1="12" x2="14" y2="12" stroke="#09090B" stroke-width="2"/>
      </svg>
    </div>
    <span class="nav-wordmark">SMASH <em>STUDIO</em></span>
  </a>
</nav>

<main class="cb-page">
  <div class="cb-card">

    <!-- Loading state -->
    <div id="stateLoading">
      <div class="cb-icon spin" id="spinIcon"></div>
      <div class="cb-title">VERIFYING</div>
      <p class="cb-body">Confirming your email address…</p>
    </div>

    <!-- Success state -->
    <div id="stateSuccess" style="display:none">
      <div class="cb-icon success">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="cb-title">EMAIL VERIFIED</div>
      <p class="cb-body" id="successMsg">Your account is confirmed. You're all set to book courts!</p>
      <a href="book.html" class="cb-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Book a Court
      </a>
    </div>

    <!-- Error state -->
    <div id="stateError" style="display:none">
      <div class="cb-icon error">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <div class="cb-title">LINK EXPIRED</div>
      <p class="cb-body" id="errorMsg">The verification link has expired or already been used. Please sign up again or request a new link.</p>
      <a href="signup.html" class="cb-btn">Try Again</a>
      <a href="login.html" class="cb-btn ghost">Sign In Instead</a>
    </div>

  </div>
</main>

<script>
(async function () {
  'use strict';

  function show(state) {
    ['Loading', 'Success', 'Error'].forEach(s =>
      document.getElementById('state' + s).style.display = s === state ? 'block' : 'none'
    );
  }

  try {
    const db = window.apexDB;
    if (!db) throw new Error('Supabase not loaded');

    // ── Handle both URL formats Supabase may use ──────────────

    // 1) PKCE flow: ?code=...  (newer default)
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');

    // 2) Implicit flow: #access_token=...&type=signup  (older / custom redirect)
    const hash = new URLSearchParams(window.location.hash.replace('#', '?'));
    const accessToken  = hash.get('access_token');
    const refreshToken = hash.get('refresh_token');
    const type = hash.get('type') || params.get('type');

    let session = null;

    if (code) {
      // PKCE — exchange code for session
      const { data, error } = await db.auth.exchangeCodeForSession(code);
      if (error) throw error;
      session = data.session;
    } else if (accessToken) {
      // Implicit — set session directly
      const { data, error } = await db.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      if (error) throw error;
      session = data.session;
    } else {
      // Maybe Supabase already handled it on load — check current session
      const { data } = await db.auth.getSession();
      session = data.session;
      if (!session) throw new Error('No auth tokens found in URL');
    }

    if (!session) throw new Error('Session could not be established');

    // ── Save to localStorage ───────────────────────────────────
    const user = session.user;
    const meta = user.user_metadata || {};
    const fullName = [meta.first_name, meta.last_name].filter(Boolean).join(' ') || user.email;
    const role = meta.role || 'member';
    const roleLabel = role === 'admin' ? 'Admin' : role === 'pos_staff' ? 'POS Staff' : 'member';

    localStorage.setItem('apexUser',   fullName);
    localStorage.setItem('apexRole',   roleLabel);
    localStorage.setItem('apexUserId', user.id);

    // Update success message
    if (fullName) document.getElementById('successMsg').textContent =
      `Welcome, ${fullName}! Your email is confirmed. You're ready to book courts.`;

    show('Success');

    // Auto-redirect after 3s
    setTimeout(() => { window.location.href = 'book.html'; }, 3000);

  } catch (err) {
    console.error('[Auth Callback]', err);
    const msg = err.message || '';
    if (msg.includes('expired') || msg.includes('invalid') || msg.includes('No auth')) {
      document.getElementById('errorMsg').textContent =
        'The verification link has expired or already been used. ' +
        'Links are valid for 24 hours. Please sign up again to get a new link.';
    }
    show('Error');
  }
})();
</script>



<script type="module" src="/src/pages/auth-callback.js"></script>
</body>
</html>
